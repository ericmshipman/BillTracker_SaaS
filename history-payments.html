<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <title>Payment History</title>
    
        <!-- Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
        <!-- Supabase - Auth -->
        <script src="Scripts/supabase-auth.js"></script>
    
        <!-- Supabase - Crud -->
        <script src="Scripts/supabase-common.js"></script>
    
        <!-- Global CSS -->
        <link rel="stylesheet" href="CSS/style.css"/>
    
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
        
        <!-- Theme -->
        <script src="Scripts/theme.js"></script>
        <link id="themeStylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script>
            let theme = localStorage.getItem('bt-theme');
            
            if (!theme || !(theme in themeUrls)) {
              theme = 'bootstrap';
            }

            let link = document.getElementById('themeStylesheet');
            if (!link) {
                link = document.createElement('link');
                link.id = 'themeStylesheet';
                link.rel = 'stylesheet';
                document.head.appendChild(link);
            }
            link.href = themeUrls[theme];
        </script>
    
        <!-- Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">    
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"></link>
    
        <!-- Shared JS -->
        <script src="Scripts/script.js"></script>  
    
        <!-- Specific JS -->
        <script src="Scripts/history-payments.js"></script>

        <script src="Scripts/icon.js"></script>
    </head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <svg class="icon icon-logo" width="30" height="30" aria-hidden="true"><use href="#logo-symbol"></use></svg>  
                <span class="mx-2">Payment History</span>
              </a>
            
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="bills.html">Bills</a></li>
              <li class="nav-item"><a class="nav-link" href="payments.html">Payments</a></li>
              <li class="nav-item"><a class="nav-link" href="plan-payments.html">Plan</a></li>
              <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
              <li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
            </ul>
          </div>
        </div>
      </nav>

    <div class="container my-2" style="padding-bottom: 110px;">
        <div class="my-2 d-flex justify-content-between align-items-center">
            <div id="filterBreadcrumb" class="small text-muted text-truncate" style="max-width: 70%; cursor: pointer;" role="button" onclick="toggleFilterCard()"></div>
            <div class="d-flex align-items-center ms-2">
                <span class="px-2 rounded hover-bg-light" role="button" onclick="resetFilterState()" title="Restore default filter range">
                    <i class="bi-arrow-clockwise text-primary fs-4"></i>
                </span>
                <span class="px-0 rounded hover-bg-light" role="button" id="filterButton" onclick="toggleFilterCard()">
                    <i class="bi-funnel text-primary fs-4" id="toggleFilter"></i>
                </span>
            </div>
        </div>

        <div class="card collapse-custom" id="filterCard">
            <div class="card-body">
                <div class="row g-2 mb-2">
                    <div class="col-md-3">
                        <div class="form-floating">
                            <input type="date" class="form-control" id="historyStartDate" onchange="loadBillHistory()">
                            <label for="historyStartDate">Start Date</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating">
                            <input type="date" class="form-control" id="historyEndDate" onchange="loadBillHistory()">
                            <label for="historyEndDate">End Date</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-floating">
                            <select class="form-select" id="historyBillFilter" onchange="loadBillHistory()">
                                <option value="">All Bills</option>
                            </select>
                            <label for="historyBillFilter">Bill</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <select class="form-select" id="historySortBy" onchange="loadBillHistory()">
                                <option value="planned_date_desc" selected>Planned Date (Newest)</option>
                                <option value="planned_date_asc">Planned Date (Oldest)</option>
                                <option value="due_date_desc">Due Date (Newest)</option>
                                <option value="due_date_asc">Due Date (Oldest)</option>
                                <option value="paid_date_desc">Paid Date (Newest)</option>
                                <option value="paid_date_asc">Paid Date (Oldest)</option>
                                <option value="amount_desc">Amount (High-Low)</option>
                                <option value="amount_asc">Amount (Low-High)</option>
                            </select>
                            <label for="historySortBy">Order</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card my-2">
            <div class="m-2 align-text-top">
                <div class="d-flex justify-content-between align-text-top">
                    <div class="text-success fw-bold fs-6" id="totalPaid">Paid: $0.00</div>
                    <div class="text-danger fw-bold fs-6" id="totalUnpaid">Unpaid: $0.00</div>
                </div>
            </div>
        </div>

        <div id="historySummary" class="small text-muted mb-2"></div>
        <div id="historyPreview"></div>
    </div>

    <div class="fixed-bottom border-top bg-body p-2">
        <div class="container">
            <a href="payments.html" class="btn btn-primary w-100 my-4">Back</a>
        </div>
    </div>

    <script>
        (async () => {
            await redirectIfNotLoggedIn();
            await applySavedTheme();
            await initHistoryPaymentsPage();
        })();
    </script>
</body>
</html>
